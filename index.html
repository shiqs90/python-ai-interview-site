<style>
:root{
  --bg:#0B1622; --bg2:#0E1B2A; --panel:#122234; --panelHi:#16293D;
  --border:#1E3A52; --borderSoft:#17293b;
  --text:#D6DEEB; --muted:#8497AD; --faint:#5B6E82;
  --gold:#FFCB6B; --teal:#7FDBCA; --blue:#82AAFF; --violet:#C792EA;
  --green:#C3E88D; --orange:#F78C6C; --red:#EF6B73;
  --mono:'JetBrains Mono',ui-monospace,'SF Mono',Menlo,Consolas,monospace;
  --sans:'Inter',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;line-height:1.5;-webkit-font-smoothing:antialiased;}
button{font-family:inherit;cursor:pointer;}
*:focus-visible{outline:2px solid var(--gold);outline-offset:2px;border-radius:3px;}
.app{display:flex;flex-direction:column;min-height:100vh;}

/* topbar */
.topbar{display:flex;align-items:center;gap:18px;padding:12px 22px;background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:40;}
.hamburger{display:none;background:none;border:1px solid var(--border);color:var(--text);font-size:18px;width:38px;height:38px;border-radius:8px;}
.brand{display:flex;align-items:center;gap:12px;}
.brand-glyph{font-family:var(--mono);color:var(--gold);font-size:18px;font-weight:600;letter-spacing:-1px;}
.brand-title{font-weight:700;font-size:15px;letter-spacing:-0.2px;}
.brand-sub{font-family:var(--mono);font-size:10.5px;color:var(--faint);text-transform:uppercase;letter-spacing:1.5px;}
.modes{display:flex;gap:4px;background:var(--bg);padding:4px;border-radius:10px;border:1px solid var(--border);margin-left:8px;}
.mode{background:none;border:none;color:var(--muted);padding:6px 16px;border-radius:7px;font-size:13px;font-weight:600;transition:.15s;}
.mode.on{background:var(--panelHi);color:var(--text);}
.progress{margin-left:auto;display:flex;align-items:center;gap:10px;}
.progress-num{font-family:var(--mono);font-size:15px;font-weight:600;color:var(--gold);}
.progress-den{color:var(--faint);font-size:12px;}
.progress-bar{width:120px;height:6px;background:var(--panel);border-radius:99px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--teal));border-radius:99px;transition:width .4s ease;}
.progress-lbl{font-family:var(--mono);font-size:10px;color:var(--faint);text-transform:uppercase;letter-spacing:1px;}

/* layout */
.body{display:flex;flex:1;min-height:0;}
.sidebar{width:300px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);overflow:hidden;}
.sidebar-scroll{height:calc(100vh - 63px);overflow-y:auto;padding:20px 14px 40px;position:sticky;top:63px;}
.sec{margin-bottom:26px;}
.sec-head{display:flex;align-items:flex-start;gap:10px;padding:0 8px 10px;}
.sec-tick{width:3px;align-self:stretch;border-radius:2px;min-height:26px;}
.sec-labels{flex:1;}
.sec-label{font-family:var(--mono);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;}
.sec-sub{font-size:11px;color:var(--faint);margin-top:2px;}
.sec-count{font-family:var(--mono);font-size:10.5px;color:var(--faint);}
.topics{list-style:none;margin:0;padding:0;}
.topic-btn{display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:none;border:none;border-left:2px solid transparent;color:var(--muted);padding:8px 10px;border-radius:0 7px 7px 0;font-size:13.5px;transition:.12s;}
.topic-btn:hover{background:var(--panel);color:var(--text);}
.topic-btn.active{background:var(--panel);color:var(--text);font-weight:600;}
.topic-dot{width:9px;height:9px;border-radius:99px;border:1.5px solid var(--faint);flex-shrink:0;transition:.15s;}
.topic-name{flex:1;}
.sidebar-foot{font-size:11.5px;color:var(--faint);padding:14px 10px;border-top:1px solid var(--borderSoft);margin-top:8px;line-height:1.6;}
.scrim{display:none;}

/* content */
.content{flex:1;overflow-y:auto;height:calc(100vh - 63px);}
.topic{max-width:760px;margin:0 auto;padding:40px 32px 80px;}
.topic-eyebrow{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.eyebrow-tag{font-family:var(--mono);font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;border:1px solid;padding:4px 10px;border-radius:99px;}
.eyebrow-index{font-family:var(--mono);font-size:11px;color:var(--faint);letter-spacing:1px;}
.topic-title{font-size:34px;font-weight:700;letter-spacing:-0.8px;margin:0 0 20px;line-height:1.1;}
.why{border-left:3px solid;background:var(--bg2);padding:14px 18px;border-radius:0 10px 10px 0;margin-bottom:34px;}
.why-lbl{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:1.5px;font-weight:600;}
.why p{margin:6px 0 0;font-size:15px;color:var(--text);}
.h2{font-size:13px;font-family:var(--mono);text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin:38px 0 14px;font-weight:600;}
.points{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:12px;}
.points li{display:flex;gap:11px;font-size:14.5px;color:var(--text);}
.point-mark{font-size:13px;margin-top:2px;flex-shrink:0;}
code.inline{font-family:var(--mono);font-size:0.85em;background:var(--panel);color:var(--teal);padding:1.5px 6px;border-radius:5px;border:1px solid var(--borderSoft);}

/* code block */
.code{background:#071019;border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:16px;}
.code-tab{display:flex;align-items:center;gap:7px;padding:9px 14px;background:var(--bg2);border-bottom:1px solid var(--border);}
.dot{width:10px;height:10px;border-radius:99px;}
.code-file{font-family:var(--mono);font-size:11.5px;color:var(--muted);margin-left:6px;}
.copy{margin-left:auto;background:none;border:1px solid var(--border);color:var(--muted);font-family:var(--mono);font-size:10.5px;padding:3px 10px;border-radius:6px;transition:.12s;}
.copy:hover{color:var(--text);border-color:var(--faint);}
.code-body{margin:0;padding:14px 0;overflow-x:auto;font-family:var(--mono);font-size:12.8px;line-height:1.65;}
.code-line{display:flex;padding:0 16px;}
.code-line:hover{background:rgba(130,170,255,0.04);}
.gutter{width:30px;flex-shrink:0;text-align:right;padding-right:16px;color:#2E4358;user-select:none;}
.ln{white-space:pre;color:#CBD6E4;}
/* compact code (used inside drills / flashcards) */
.code.mini{margin:12px 0 0;border-radius:10px;}
.mini-tab{display:flex;align-items:center;gap:8px;padding:6px 12px;background:var(--bg2);border-bottom:1px solid var(--border);}
.mini-label{font-family:var(--mono);font-size:9.5px;text-transform:uppercase;letter-spacing:1.5px;color:var(--faint);}
.code.mini .code-body{font-size:12px;padding:11px 0;}

/* inline drills */
.drills{display:flex;flex-direction:column;gap:10px;}
.drill{border:1px solid var(--border);border-radius:10px;overflow:hidden;background:var(--bg2);}
.drill.open{border-color:var(--faint);}
.drill-q{display:flex;align-items:flex-start;gap:12px;width:100%;text-align:left;background:none;border:none;color:var(--text);padding:14px 16px;font-size:14px;}
.drill-mark{font-family:var(--mono);font-size:9.5px;font-weight:600;letter-spacing:1.5px;color:var(--gold);border:1px solid var(--border);padding:3px 7px;border-radius:5px;flex-shrink:0;margin-top:1px;}
.drill-text{flex:1;font-weight:500;line-height:1.5;}
.drill-caret{font-family:var(--mono);font-size:18px;color:var(--faint);flex-shrink:0;line-height:1;}
.drill-code{padding:0 16px 6px;}
.drill-a{padding:2px 16px 16px;font-size:14px;color:var(--text);line-height:1.7;}
.drill-a .code.mini{margin-top:14px;}
.drill:not(.open) .drill-a{display:none;}
.answer-lbl{display:block;font-family:var(--mono);font-size:9.5px;text-transform:uppercase;letter-spacing:1.5px;color:var(--green);margin-bottom:7px;}

/* topic foot */
.topic-foot{margin-top:40px;padding-top:24px;border-top:1px solid var(--borderSoft);display:flex;flex-direction:column;gap:18px;}
.review-btn{align-self:flex-start;background:var(--panel);border:1px solid var(--border);color:var(--muted);padding:9px 20px;border-radius:9px;font-size:13.5px;font-weight:600;transition:.15s;}
.review-btn:hover{color:var(--text);}
.review-btn.done{background:var(--bg2);}
.nav-pair{display:flex;gap:10px;flex-wrap:wrap;}
.pager{background:var(--bg2);border:1px solid var(--border);color:var(--muted);padding:9px 16px;border-radius:9px;font-size:13px;transition:.15s;}
.pager:hover{color:var(--text);border-color:var(--faint);}

/* drill mode */
.drillmode{max-width:720px;margin:0 auto;padding:40px 32px 80px;}
.drill-head{margin-bottom:28px;}
.drill-intro{color:var(--muted);font-size:15px;margin:8px 0 20px;}
.drill-filters{display:flex;flex-wrap:wrap;gap:8px;}
.chip{background:var(--bg2);border:1px solid var(--border);color:var(--muted);font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:1px;padding:6px 12px;border-radius:99px;transition:.12s;}
.chip:hover{color:var(--text);}
.chip.on{background:var(--panel);font-weight:600;}
.flash-meta{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px;}
.flash-topic{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:1px;font-weight:600;}
.flash-count{font-family:var(--mono);font-size:12px;color:var(--faint);}
.flash{width:100%;min-height:220px;text-align:left;color:var(--text);border:1px solid var(--border);border-top:3px solid var(--accent,var(--gold));border-radius:14px;background:var(--bg2);padding:28px 26px;transition:border-color .15s;display:block;cursor:pointer;}
.flash:hover{border-color:var(--faint);}
.flash-face{display:flex;flex-direction:column;gap:12px;}
.flash-tag{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--faint);}
.flash-q{font-size:20px;font-weight:600;line-height:1.4;margin:0;letter-spacing:-0.3px;color:var(--text);}
.flash-a{font-size:15px;line-height:1.7;margin:0;color:var(--text);}
.flash .code.mini{margin-top:16px;}
.flash-hint{font-family:var(--mono);font-size:11px;color:var(--faint);margin-top:6px;}
.flash:not(.flipped) .flash-back{display:none;}
.flash.flipped .flash-front{display:none;}
.flash-controls{display:flex;gap:10px;margin-top:16px;}
.pager.wide{flex:1;text-align:center;}
.pager.primary{background:var(--panelHi);color:var(--text);}
.empty{color:var(--muted);}

@media (max-width:860px){
  .hamburger{display:block;}
  .brand-sub{display:none;}
  .progress-bar,.progress-lbl{display:none;}
  .sidebar{position:fixed;left:0;top:63px;bottom:0;z-index:45;transform:translateX(-100%);transition:transform .22s ease;width:290px;}
  .sidebar.open{transform:translateX(0);box-shadow:0 0 40px rgba(0,0,0,.5);}
  .sidebar-scroll{height:100%;position:static;}
  .scrim.show{display:block;position:fixed;inset:63px 0 0 0;background:rgba(3,8,14,.6);z-index:44;}
  .topic,.drillmode{padding:28px 20px 70px;}
  .topic-title{font-size:27px;}
  .modes{margin-left:0;}
}
@media (max-width:520px){
  .topbar{gap:10px;padding:10px 14px;}
  .brand-title{font-size:13px;}
  .mode{padding:6px 12px;font-size:12px;}
  .flash-q{font-size:18px;}
}
@media (prefers-reduced-motion:reduce){*{transition:none !important;}}

<script>
"use strict";

/* ================= syntax highlighter ================= */
var KW = new Set(("False None True and as assert async await break class continue def del elif else except finally for from global if import in is lambda nonlocal not or pass raise return try while with yield").split(" "));
var BI = new Set(("print len range enumerate zip map filter sorted sum min max abs isinstance type str int float bool list dict set tuple open super property staticmethod classmethod object Exception ValueError TypeError ConnectionError RuntimeError KeyError TimeoutError").split(" "));
var SP = new Set(["self","cls"]);
var SYN = {kw:"#C792EA",str:"#C3E88D",num:"#F78C6C",fn:"#82AAFF",bi:"#7FDBCA",dec:"#FFCB6B",com:"#54687C",sp:"#F78C6C",punc:"#8497AD",def:null};
var LINE_RE = /(#[^\n]*)|(f?r?"(?:\\.|[^"\\])*"|f?r?'(?:\\.|[^'\\])*')|(@\w+)|(\b\d[\d_]*\.?\d*\b)|([A-Za-z_]\w*)|(\s+)|([^\sA-Za-z0-9_#'"@]+)|(.)/g;

function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

function tokenizeLine(line){
  var out=[], m; LINE_RE.lastIndex=0;
  while((m=LINE_RE.exec(line))!==null){
    if(m[1]) out.push([m[1],SYN.com]);
    else if(m[2]) out.push([m[2],SYN.str]);
    else if(m[3]) out.push([m[3],SYN.dec]);
    else if(m[4]) out.push([m[4],SYN.num]);
    else if(m[5]){
      var id=m[5]; var after=line.slice(LINE_RE.lastIndex).match(/^\s*\(/);
      if(KW.has(id)) out.push([id,SYN.kw]);
      else if(SP.has(id)) out.push([id,SYN.sp]);
      else if(after) out.push([id,SYN.fn]);
      else if(BI.has(id)) out.push([id,SYN.bi]);
      else out.push([id,null]);
    }
    else if(m[6]) out.push([m[6],null]);
    else if(m[7]) out.push([m[7],SYN.punc]);
    else out.push([m[0],null]);
  }
  return out;
}

function codeRows(src){
  var lines = src.replace(/\n$/,"").split("\n");
  return lines.map(function(ln,i){
    var inner = ln.length===0 ? " " : tokenizeLine(ln).map(function(t){
      return t[1] ? '<span style="color:'+t[1]+'">'+esc(t[0])+'</span>' : esc(t[0]);
    }).join("");
    return '<div class="code-line"><span class="gutter">'+(i+1)+'</span><span class="ln">'+inner+'</span></div>';
  }).join("");
}

function codeBlock(file, src){
  return '<div class="code"><div class="code-tab">'
    +'<span class="dot" style="background:#ff5f57"></span>'
    +'<span class="dot" style="background:#febc2e"></span>'
    +'<span class="dot" style="background:#28c840"></span>'
    +'<span class="code-file">'+esc(file)+'</span>'
    +'<button class="copy" data-action="copy" data-src="'+encodeURIComponent(src)+'">copy</button>'
    +'</div><pre class="code-body">'+codeRows(src)+'</pre></div>';
}

function codeMini(src, label){
  return '<div class="code mini"><div class="mini-tab"><span class="mini-label">'+esc(label)+'</span>'
    +'<button class="copy" data-action="copy" data-src="'+encodeURIComponent(src)+'">copy</button></div>'
    +'<pre class="code-body">'+codeRows(src)+'</pre></div>';
}

function withCode(text){
  return text.split("`").map(function(p,i){
    return i%2===1 ? '<code class="inline">'+esc(p)+'</code>' : esc(p);
  }).join("");
}

/* ================= curriculum ================= */
var CURRICULUM = [
{ id:"tier1", label:"Tier 1", sub:"Will definitely be asked", color:"#FFCB6B", topics:[
  { id:"async", name:"Async programming", why:"The #1 topic for this role. An agent juggles many concurrent I/O calls — async is how one thread does that without blocking.",
    points:[
      "A coroutine is defined with `async def`. Calling it returns a coroutine object that does nothing until awaited or scheduled on the event loop.",
      "`await` yields control back to the loop while waiting on I/O, letting other coroutines run. One thread, cooperative multitasking.",
      "Async wins for I/O-bound work (API calls, DB queries, network) where you mostly wait. It does NOT speed up CPU-bound work — a busy loop still blocks the loop.",
      "Threads: OS-scheduled, share memory, held back by the GIL for CPU work but fine for blocking I/O with sync libs. Processes: separate memory, true parallelism, for CPU-bound work.",
      "`asyncio.gather()` runs awaitables concurrently and returns results in argument order.",
      "The trap: a blocking call (time.sleep, requests.get) inside a coroutine freezes the entire event loop. Use asyncio.sleep, httpx, or asyncio.to_thread."
    ],
    code:[
      {file:"basics.py", src:
`import asyncio

async def fetch(name: str, delay: float) -> str:
    await asyncio.sleep(delay)   # non-blocking; yields to the loop
    return name

async def main() -> None:
    # sequential: ~3s total
    await fetch("a", 1)
    await fetch("b", 2)

    # concurrent: ~2s total (bounded by the slowest)
    results = await asyncio.gather(
        fetch("c", 1),
        fetch("d", 2),
    )
    print(results)   # ['c', 'd'] -- order preserved

asyncio.run(main())`},
      {file:"the_blocking_trap.py", src:
`import asyncio, time

# BUG: time.sleep blocks the WHOLE event loop.
async def bad():
    time.sleep(2)          # blocking!
    # requests.get(url)    # also blocking -> use httpx

# Fix 1: await a real async call
async def good():
    await asyncio.sleep(2)

# Fix 2: offload unavoidable blocking work to a thread
async def good_offload():
    await asyncio.to_thread(time.sleep, 2)`}
    ],
    drills:[
      {q:"This FastAPI endpoint is meant to handle many concurrent requests, but under load they queue up one behind another and latency explodes. What's wrong, and how do you fix it?",
       code:
`import requests
from fastapi import FastAPI

app = FastAPI()

@app.get("/price/{symbol}")
async def get_price(symbol: str):          # called ~200x/sec
    resp = requests.get(f"https://api.exchange.com/{symbol}")
    return {"symbol": symbol, "price": resp.json()["last"]}`,
       a:"requests.get is synchronous. Because the handler is async, that blocking call freezes the single event-loop thread — every other in-flight request stalls until it returns, so the endpoint effectively serializes. Fix: use an async client and await it (reuse one client for connection pooling). If you must keep a sync library, offload it with await asyncio.to_thread(requests.get, url).",
       acode:
`import httpx
from fastapi import FastAPI

app = FastAPI()
client = httpx.AsyncClient(timeout=10.0)   # created once, pooled

@app.get("/price/{symbol}")
async def get_price(symbol: str):
    resp = await client.get(f"https://api.exchange.com/{symbol}")
    resp.raise_for_status()
    return {"symbol": symbol, "price": resp.json()["last"]}`},
      {q:"These three lookups are independent but the function takes ~1s because they run one after another. Make them run concurrently.",
       code:
`async def gather_context(query: str):
    a = await search_docs(query)     # ~300ms
    b = await search_web(query)      # ~500ms
    c = await search_memory(query)   # ~200ms
    return combine(a, b, c)          # total ~= 1000ms`,
       a:"They're awaited sequentially, so the latencies add up. Since they don't depend on each other, run them concurrently with asyncio.gather — total time drops to the slowest call (~500ms). Results come back in argument order, so unpacking is safe.",
       acode:
`import asyncio

async def gather_context(query: str):
    a, b, c = await asyncio.gather(
        search_docs(query),
        search_web(query),
        search_memory(query),
    )                                # total ~= 500ms
    return combine(a, b, c)`},
      {q:"Coroutines vs threads vs processes — when do you reach for each?",
       a:"Coroutines (asyncio): one thread, cooperative, ideal for lots of concurrent I/O (API/DB calls) — exactly what an agent does. Threads: OS-scheduled, share memory, good for blocking I/O with sync libraries, but the GIL means no speedup for CPU work. Processes: separate memory, real multi-core parallelism, for CPU-bound work."}
    ]},
  { id:"gil", name:"The GIL", why:"Explains why threads don't speed up CPU work and why multiprocessing exists — a classic conceptual check.",
    points:[
      "The Global Interpreter Lock lets only one thread execute Python bytecode at a time in CPython.",
      "So multithreading gives no speedup for CPU-bound work — threads take turns, never running Python in parallel.",
      "Threads DO help for I/O-bound work: a thread releases the GIL while blocked on I/O, so others run.",
      "For real CPU parallelism use multiprocessing (separate processes, separate interpreters) or native/C libs that release the GIL.",
      "Worth a mention: CPython 3.13 ships an experimental free-threaded (no-GIL) build, but the GIL is still the default and the interview-relevant model."
    ],
    code:[
      {file:"gil.py", src:

def retry(attempts=3, base_delay=0.5):

/* flatten */
var ALL_TOPICS = [];
CURRICULUM.forEach(function(s){ s.topics.forEach(function(t){ ALL_TOPICS.push(Object.assign({},t,{color:s.color,sectionLabel:s.label,sectionId:s.id})); }); });
var ALL_DRILLS = [];
CURRICULUM.forEach(function(s){ s.topics.forEach(function(t){ (t.drills||[]).forEach(function(d){ ALL_DRILLS.push(Object.assign({},d,{topic:t.name,color:s.color,section:s.label,sectionId:s.id})); }); }); });

/* ================= state + persistence ================= */
var LS_KEY = "pyprep:reviewed:v1";
function loadReviewed(){ try{ return new Set(JSON.parse(localStorage.getItem(LS_KEY)||"[]")); }catch(e){ return new Set(); } }
function saveReviewed(set){ try{ localStorage.setItem(LS_KEY, JSON.stringify(Array.from(set))); }catch(e){} }

var state = {
  mode:"study",
  activeId: ALL_TOPICS[0].id,
  reviewed: loadReviewed(),
  navOpen:false,
  drillFilter:"all",
  drillIndex:0,
  flipped:false
};

function findTopic(id){ for(var i=0;i<ALL_TOPICS.length;i++){ if(ALL_TOPICS[i].id===id) return ALL_TOPICS[i]; } return ALL_TOPICS[0]; }
function findSection(id){ for(var i=0;i<CURRICULUM.length;i++){ if(CURRICULUM[i].topics.some(function(t){return t.id===id;})) return CURRICULUM[i]; } return CURRICULUM[0]; }
function pad(n){ return (n<10?"0":"")+n; }

/* ================= render ================= */
var app = document.getElementById("app");

function render(){
  var total = ALL_TOPICS.length, done = state.reviewed.size;
  var pct = total ? (done/total*100) : 0;
  var html = ''
  + '<header class="topbar">'
  +   '<button class="hamburger" data-action="toggleNav" aria-label="Toggle topics">&#8801;</button>'
  +   '<div class="brand"><span class="brand-glyph">&gt;&gt;&gt;</span><div>'
  +     '<div class="brand-title">Python for AI</div>'
  +     '<div class="brand-sub">Interview prep console</div></div></div>'
  +   '<div class="modes">'
  +     '<button class="mode '+(state.mode==="study"?"on":"")+'" data-action="setMode" data-mode="study">Study</button>'
  +     '<button class="mode '+(state.mode==="drill"?"on":"")+'" data-action="setMode" data-mode="drill">Drill</button>'
  +   '</div>'
  +   '<div class="progress"><span class="progress-num">'+done+'<span class="progress-den">/'+total+'</span></span>'
  +     '<div class="progress-bar"><div class="progress-fill" style="width:'+pct+'%"></div></div>'
  +     '<span class="progress-lbl">reviewed</span></div>'
  + '</header>'
  + '<div class="body">'
  +   sidebarHTML()
  +   '<div class="scrim '+(state.navOpen?"show":"")+'" data-action="closeNav"></div>'
  +   '<main class="content" id="content">'+(state.mode==="study"?studyHTML():drillHTML())+'</main>'
  + '</div>';
  app.innerHTML = html;
}

function sidebarHTML(){
  var out = '<aside class="sidebar '+(state.navOpen?"open":"")+'"><div class="sidebar-scroll">';
  CURRICULUM.forEach(function(sec){
    var secDone = sec.topics.filter(function(t){return state.reviewed.has(t.id);}).length;
    out += '<div class="sec"><div class="sec-head">'
      + '<span class="sec-tick" style="background:'+sec.color+'"></span>'
      + '<div class="sec-labels"><div class="sec-label" style="color:'+sec.color+'">'+esc(sec.label)+'</div>'
      + '<div class="sec-sub">'+esc(sec.sub)+'</div></div>'
      + '<span class="sec-count">'+secDone+'/'+sec.topics.length+'</span></div><ul class="topics">';
    sec.topics.forEach(function(t){
      var isActive = (t.id===state.activeId && state.mode==="study");
      var isRev = state.reviewed.has(t.id);
      out += '<li><button class="topic-btn '+(isActive?"active":"")+'" data-action="goTopic" data-id="'+t.id+'"'
        + (isActive?' style="border-left-color:'+sec.color+'"':'')+'>'
        + '<span class="topic-dot '+(isRev?"on":"")+'"'+(isRev?' style="background:'+sec.color+';border-color:'+sec.color+'"':'')+'></span>'
        + '<span class="topic-name">'+esc(t.name)+'</span></button></li>';
    });
    out += '</ul></div>';
  });
  var all = state.reviewed.size===ALL_TOPICS.length;
  out += '<div class="sidebar-foot">'+(all
    ? "Every topic reviewed. Switch to Drill mode and go cold."
    : "Tap the dot as you master each topic — progress saves in this browser.")+'</div>';
  out += '</div></aside>';
  return out;
}

function studyHTML(){
  var t = findTopic(state.activeId), sec = findSection(state.activeId);
  var idx = ALL_TOPICS.map(function(x){return x.id;}).indexOf(t.id);
  var total = ALL_TOPICS.length;
  var prev = idx>0 ? ALL_TOPICS[idx-1] : null;
  var next = idx<total-1 ? ALL_TOPICS[idx+1] : null;
  var isRev = state.reviewed.has(t.id);

  var out = '<article class="topic" style="--accent:'+sec.color+'">'
    + '<div class="topic-eyebrow"><span class="eyebrow-tag" style="color:'+sec.color+';border-color:'+sec.color+'">'+esc(sec.label)+'</span>'
    + '<span class="eyebrow-index">'+pad(idx+1)+' / '+pad(total)+'</span></div>'
    + '<h1 class="topic-title">'+esc(t.name)+'</h1>'
    + '<div class="why" style="border-color:'+sec.color+'"><span class="why-lbl" style="color:'+sec.color+'">why it matters</span><p>'+esc(t.why)+'</p></div>'
    + '<h2 class="h2">Key points</h2><ul class="points">';
  t.points.forEach(function(p){
    out += '<li><span class="point-mark" style="color:'+sec.color+'">&#9657;</span><span>'+withCode(p)+'</span></li>';
  });
  out += '</ul><h2 class="h2">Code</h2>';
  t.code.forEach(function(c){ out += codeBlock(c.file, c.src); });

  if(t.drills && t.drills.length){
    out += '<h2 class="h2">Test yourself</h2><div class="drills">';
    t.drills.forEach(function(d){
      out += '<div class="drill"><button class="drill-q" data-action="toggleDrill">'
        + '<span class="drill-mark">DRILL</span><span class="drill-text">'+esc(d.q)+'</span><span class="drill-caret">+</span></button>'
        + (d.code ? '<div class="drill-code">'+codeMini(d.code, "code")+'</div>' : '')
        + '<div class="drill-a"><span class="answer-lbl">answer</span>'+esc(d.a)
        + (d.acode ? codeMini(d.acode, "the fix") : '') + '</div></div>';
    });
    out += '</div>';
  }

  out += '<div class="topic-foot">'
    + '<button class="review-btn '+(isRev?"done":"")+'" data-action="toggleReviewed" data-id="'+t.id+'"'
    + (isRev?' style="border-color:'+sec.color+';color:'+sec.color+'"':'')+'>'
    + (isRev?"&#10003; Reviewed":"Mark as reviewed")+'</button><div class="nav-pair">'
    + (prev?'<button class="pager" data-action="goTopic" data-id="'+prev.id+'">&#8592; '+esc(prev.name)+'</button>':'')
    + (next?'<button class="pager" data-action="goTopic" data-id="'+next.id+'">'+esc(next.name)+' &#8594;</button>':'')
    + '</div></div></article>';
  return out;
}

function drillHTML(){
  var list = state.drillFilter==="all" ? ALL_DRILLS : ALL_DRILLS.filter(function(d){return d.sectionId===state.drillFilter;});
  var filters = [{id:"all",label:"All",color:"#D6DEEB"}].concat(CURRICULUM.map(function(s){return {id:s.id,label:s.label,color:s.color};}));
  if(state.drillIndex>=list.length) state.drillIndex=0;
  var card = list[state.drillIndex];

  var out = '<div class="drillmode"><div class="drill-head"><h1 class="topic-title">Drill deck</h1>'
    + '<p class="drill-intro">Read the question and the code, answer out loud, then flip for the fix. These are the exact shapes they will throw at you.</p>'
    + '<div class="drill-filters">';
  filters.forEach(function(f){
    var on = state.drillFilter===f.id;
    out += '<button class="chip '+(on?"on":"")+'" data-action="drillFilter" data-f="'+f.id+'"'
      + (on?' style="color:'+f.color+';border-color:'+f.color+'"':'')+'>'+esc(f.label)+'</button>';
  });
  out += '</div></div>';

  if(card){
    var front = '<div class="flash-face flash-front"><span class="flash-tag">question</span>'
      + '<p class="flash-q">'+esc(card.q)+'</p>'
      + (card.code ? codeMini(card.code, "the code") : '')
      + '<span class="flash-hint">tap, press Reveal, or hit space to flip</span></div>';
    var back = '<div class="flash-face flash-back"><span class="flash-tag" style="color:'+card.color+'">answer</span>'
      + '<p class="flash-a">'+esc(card.a)+'</p>'
      + (card.acode ? codeMini(card.acode, "the fix") : '') + '</div>';

    out += '<div class="flashwrap"><div class="flash-meta">'
      + '<span class="flash-topic" style="color:'+card.color+'">'+esc(card.section)+' &middot; '+esc(card.topic)+'</span>'
      + '<span class="flash-count">'+(state.drillIndex+1)+' / '+list.length+'</span></div>'
      + '<div class="flash '+(state.flipped?"flipped":"")+'" data-action="drillFlip" role="button" tabindex="0" style="--accent:'+card.color+'">'
      + front + back + '</div>'
      + '<div class="flash-controls">'
      + '<button class="pager wide" data-action="drillNav" data-dir="-1">&#8592; Prev</button>'
      + '<button class="pager wide primary" data-action="drillFlip">'+(state.flipped?"Hide":"Reveal")+'</button>'
      + '<button class="pager wide" data-action="drillNav" data-dir="1">Next &#8594;</button>'
      + '</div></div>';
  } else {
    out += '<p class="empty">No drills in this filter.</p>';
  }
  out += '</div>';
  return out;
}

/* ================= copy with fallback ================= */
function copyText(text, btn){
  function done(){ if(btn){ var o=btn.textContent; btn.textContent="copied \u2713"; setTimeout(function(){btn.textContent=o;},1400);} }
  if(navigator.clipboard && window.isSecureContext){
    navigator.clipboard.writeText(text).then(done, fallback);
  } else { fallback(); }
  function fallback(){
    var ta=document.createElement("textarea"); ta.value=text; ta.style.position="fixed"; ta.style.opacity="0";
    document.body.appendChild(ta); ta.select();
    try{ document.execCommand("copy"); done(); }catch(e){}
    document.body.removeChild(ta);
  }
}

/* ================= events (delegated) ================= */
app.addEventListener("click", function(e){
  var el = e.target.closest("[data-action]");
  if(!el) return;
  var a = el.getAttribute("data-action");
  if(a==="toggleNav"){ state.navOpen=!state.navOpen; render(); }
  else if(a==="closeNav"){ state.navOpen=false; render(); }
  else if(a==="setMode"){ state.mode=el.getAttribute("data-mode"); state.navOpen=false; render(); scrollTop(); }
  else if(a==="goTopic"){ state.activeId=el.getAttribute("data-id"); state.mode="study"; state.navOpen=false; render(); scrollTop(); }
  else if(a==="toggleReviewed"){
    var id=el.getAttribute("data-id");
    if(state.reviewed.has(id)) state.reviewed.delete(id); else state.reviewed.add(id);
    saveReviewed(state.reviewed); render();
  }
  else if(a==="toggleDrill"){
    var drill = el.closest(".drill");
    if(drill){ drill.classList.toggle("open"); var c=drill.querySelector(".drill-caret"); if(c) c.textContent = drill.classList.contains("open")?"\u2212":"+"; }
  }
  else if(a==="drillFilter"){ state.drillFilter=el.getAttribute("data-f"); state.drillIndex=0; state.flipped=false; render(); }
  else if(a==="drillFlip"){ state.flipped=!state.flipped; render(); }
  else if(a==="drillNav"){
    var list = state.drillFilter==="all" ? ALL_DRILLS : ALL_DRILLS.filter(function(d){return d.sectionId===state.drillFilter;});
    var dir=parseInt(el.getAttribute("data-dir"),10);
    state.drillIndex=(state.drillIndex+dir+list.length)%list.length; state.flipped=false; render();
  }
  else if(a==="copy"){ copyText(decodeURIComponent(el.getAttribute("data-src")), el); }
});

function scrollTop(){ var c=document.getElementById("content"); if(c) c.scrollTop=0; }

document.addEventListener("keydown", function(e){
  if(state.mode!=="drill") return;
  var tag = (e.target.tagName||"").toLowerCase();
  if(tag==="input"||tag==="textarea") return;
  if(e.key==="ArrowRight"){ var n=document.querySelector('[data-action="drillNav"][data-dir="1"]'); if(n) n.click(); }
  else if(e.key==="ArrowLeft"){ var p=document.querySelector('[data-action="drillNav"][data-dir="-1"]'); if(p) p.click(); }
  else if(e.key===" "||e.key==="Enter"){ e.preventDefault(); state.flipped=!state.flipped; render(); }
});

render();
</script>
</body>
</html>
